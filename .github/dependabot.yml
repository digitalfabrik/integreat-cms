# Keep dependencies up to date with GitHub's Dependabot.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/about-dependabot-version-updates

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/"
    groups:
      frontend:
        patterns:
          - "*"
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: "/"
    groups:
      python:
        patterns:
          - "*"
    schedule:
      interval: weekly

  - package-ecosystem: devcontainer
    directory: "/"
    groups:
      devcontainer:
        patterns:
          - "*"
    schedule:
      interval: weekly
